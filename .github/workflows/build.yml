name: Build APK
on:
  push:
    tags:
      - "v*"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build APK
        run: |
          cd simple_live_app
          flutter pub get 2>&1 | tee /tmp/pub_output.txt
          flutter build apk --debug 2>&1 | tee /tmp/build_output.txt
          exit ${PIPESTATUS[0]}
      - name: Save build logs
        if: failure()
        run: |
          cat /tmp/pub_output.txt
          cat /tmp/build_output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs
          path: |
            /tmp/pub_output.txt
            /tmp/build_output.txt
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: simple-live-app
          path: simple_live_app/build/app/outputs/apk/debug/*.apk
