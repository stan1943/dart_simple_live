name: Build APK
on:
  push:
    tags:
      - "v*"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build APK
        run: |
          cd simple_live_app
          flutter pub get
          flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: simple-live-app
          path: simple_live_app/build/app/outputs/apk/release/*.apk
