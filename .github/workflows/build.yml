name: Build APK
on:
  push:
    tags:
      - "v*"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Create keystore
        run: |
          cd simple_live_app/android
          # Generate a debug keystore using Java keytool
          keytool -genkey -v -keystore debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug, OU=, O=, L=, S=, C=" 2>/dev/null
          ls -la debug.keystore
      - name: Modify build.gradle for debug signing
        run: |
          cd simple_live_app/android
          # Replace the signing config to use debug keystore
          sed -i 's/signingConfigs\.getByName("release")/signingConfigs.getByName("debug")/' app/build.gradle.kts
      - name: Build APK
        run: |
          cd simple_live_app
          flutter pub get
          flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: simple-live-app
          path: simple_live_app/build/app/outputs/apk/debug/*.apk
