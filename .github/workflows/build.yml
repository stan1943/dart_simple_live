name: Build APK
on:
  push:
    tags:
      - "v*"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        run: |
          cd simple_live_app
          flutter pub get
      - name: Build APK
        run: |
          cd simple_live_app
          flutter build apk --release --verbose 2>&1 | tail -50
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: simple-live-app
          path: simple_live_app/build/app/outputs/flutter-apk/*.apk
